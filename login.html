<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lixeira Inteligente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="login.js" defer></script>

</head>
<body>
    <!-- Tela de Login -->
    <div id="loginScreen" class="container my-5 d-flex justify-content-center align-items-center" style="min-height: 100vh; display: block;">
        <div class="card shadow-sm" style="width: 100%; max-width: 400px;">
            <div class="card-body">
                <h3 class="text-center mb-4">Login</h3>
                <div class="mb-3">
                    <label for="loginInput" class="form-label">Usuário</label>
                    <input type="text" id="loginInput" class="form-control" placeholder="Digite o usuário">
                </div>
                <div class="mb-3">
                    <label for="passwordInput" class="form-label">Senha</label>
                    <input type="password" id="passwordInput" class="form-control" placeholder="Digite a senha">
                </div>
                <button id="loginBtn" class="btn btn-primary w-100">Entrar</button>
                <p id="loginError" class="text-danger text-center mt-3" style="display: none;">Usuário ou senha incorretos.</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
