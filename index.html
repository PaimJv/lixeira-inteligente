<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lixeira Inteligente</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container my-5">
        <h1 class="text-center mb-4">Lixeira Inteligente</h1>
        
        <!-- Card de Status -->
        <div class="card mb-4 shadow-sm">
            <div class="card-body text-center">
                <h3>Status da Lixeira</h3>
                <p class="lead">Sistema: <span id="ledStatus" class="badge bg-secondary">Desconhecido</span></p>
                <p class="lead">Nível de Ocupação: <span id="volumeValue" class="badge bg-info">0%</span></p>
                <p class="lead">Altura Configurada: <span id="alturaValue" class="badge bg-primary">N/D</span></p>
            </div>
        </div>

        <!-- Visualização da Lixeira -->
        <div class="card mb-4 shadow-sm">
            <div class="card-body text-center">
                <h5>Visualização da Lixeira</h5>
                <div class="lixeira-container">
                    <div class="lixeira">
                        <div class="preenchimento" id="preenchimento"></div>
                        <img src="assets/recycle.png" alt="Recycle Symbol" class="recycle-symbol">
                    </div>
                </div>
            </div>
        </div>

        <!-- Controles -->
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body">
                     <h5>
                    Ativação Manual
                    <!-- <span class="custom-tooltip">ⓘ
                        <span class="custom-tooltip-text">Essa função ativa o sistema manualmente, sem depender de sensores.</span>
                    </span> -->
                    </h5>
                        <button id="ativacaoManualBtn" class="btn btn-success w-100">Ativar/Desativar Sistema</button>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5>Configurar lixeira</h5>
                        <div class="input-group">
                            <!-- <input type="number" id="userInput" class="form-control" placeholder="Digite a altura da lixeira"> -->
                            <button class="btn btn-primary w-100" onclick="definirAltura()">Restaurar lixeira</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Gráficos -->
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5>Volume Médio</h5>
                        <canvas id="volumeChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5>Tempo Médio para Esvaziamento</h5>
                        <canvas id="esvaziamentoChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Histórico -->
        <div class="card shadow-sm">
            <div class="card-body">
                <h5>Histórico de Medições e Ativações</h5>
                <ul id="historicoList" class="list-group"></ul>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
